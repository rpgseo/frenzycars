<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ .Site.BaseURL }}" aria-label="{{ .Site.Title }} home">
      <span class="brand-fz">FRENZY</span><span class="brand-accent">CARS</span>
    </a>
    <nav class="main-nav" aria-label="Primary">
      <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="primaryMenu">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="sr-only">Toggle menu</span>
      </button>
      <ul id="primaryMenu" class="menu">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page" class="is-active"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
  <div class="ticker" aria-hidden="true">
    <div class="ticker-track">
      <span>{{ .Site.Params.tagline }}</span><span>{{ .Site.Params.tagline }}</span><span>{{ .Site.Params.tagline }}</span><span>{{ .Site.Params.tagline }}</span><span>{{ .Site.Params.tagline }}</span><span>{{ .Site.Params.tagline }}</span>
    </div>
  </div>
</header>
