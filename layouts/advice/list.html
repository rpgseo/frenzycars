{{ define "title" }}Advice | {{ .Site.Title }}{{ end }}
{{ define "main" }}
<div class="container">
  <header class="article-head">
    <span class="card-tag">Advice</span>
    <h1 class="article-title">Car Troubleshooting & How-To Advice</h1>
  </header>
  <div class="article-grid">
    {{ range .Pages.ByPublishDate.Reverse }}
    <article class="article-card">
      <span class="card-tag">{{ .Params.category | default "Advice" }}</span>
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p>{{ .Summary }}</p>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
