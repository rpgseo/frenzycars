{{ define "title" }}{{ .Title }} | {{ .Site.Title }}{{ end }}
{{ define "main" }}
<article class="article">
  <div class="container">
    <div class="main-col" style="max-width:760px;margin-inline:auto">
      <header class="article-head">
        <span class="card-tag">About</span>
        <h1 class="article-title">{{ .Title }}</h1>
      </header>
      <div class="article-content">
        {{ .Content }}
      </div>
      <div class="rail-block newsletter-widget" style="margin-top:3rem">
        <h3 class="rail-title">Newsletter</h3>
        <p class="nw-pitch">Reviews, news &amp; features &mdash; weekly, in your inbox.</p>
        <form method="post" action="https://sendfox.com/form/3e768w/10jj8x" class="newsletter-form sendfox-form" id="10jj8x-about" data-async="true" data-recaptcha="true">
          <label class="sr-only" for="nw-email">Email address</label>
          <input id="nw-email" type="email" placeholder="you@email.com" name="email" required>
          <div style="position: absolute; left: -5000px;" aria-hidden="true"><input type="text" name="a_password" tabindex="-1" value="" autocomplete="off" /></div>
          <button type="submit">Join</button>
        </form>
        <script src="https://cdn.sendfox.com/js/form.js" charset="utf-8"></script>
      </div>
    </div>
  </div>
</article>
{{ end }}
