name = "frenzycars-content-dashboard"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "frenzycars-cars"
database_id = "b9d5f455-8e9e-439c-9283-ef1b19addf4b"

[[routes]]
pattern = "content.frenzycars.com/*"
zone_name = "frenzycars.com"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "frenzycars-images"

# Required secrets (set via: npx wrangler secret put KIE_AI_API_KEY && npx wrangler secret put GITHUB_TOKEN)
[vars]
GITHUB_REPO = "rpgseo/frenzycars"
CF_IMAGES_BASE_URL = "https://images.frenzycars.com"
