# Competitive benchmarks (beatable). Do NOT benchmark vs Edmunds/KBB/MotorTrend/C&D.
competitors:
  - hotcars.com
  - topspeed.com
  - carscoops.com
  - theautopian.com
  - slashgear.com

# Hard exclusions (SERP dominated by these -> drop unless Cat-5 long-term authority play)
majors_to_exclude:
  - edmunds.com
  - kbb.com
  - motortrend.com
  - caranddriver.com

# Phase-5 / Phase-6 tuning
filters:
  volume_floor: 200               # general; Maintenance/DIY allows lower w/ long-tail density
  maintenance_volume_floor: 0     # reduced floor for Maintenance long-tail (0 = allow unknown-vol)
  gap_priority_min_competitors: 2 # >=2 of 5 beatable sites in Top20 -> bonus
  major_dominant_min: 3           # >=N configured majors in Top10 -> SERP considered major-dominated
  cluster_serp_overlap: 0.40      # >=40% shared Top10 URLs -> same cluster
  ads_batch_size: 75              # re-process in batches of 50-100 on policy restriction
  serp_workers: 6                 # concurrency for SERP enrichment
  serp_depth: 10                  # SERP result depth (only Top-10 consumed; keep 10 to halve cost)
  # Priority reweighting (KD-driven for zero-authority domain)
  kd_high: 10                     # KD <= this contributes 2 pts
  kd_medium: 20                   # KD <= this contributes 1 pt
  volume_high: 1000               # volume >= this contributes 2 pts
  volume_medium: 300              # volume >= this contributes 1 pt
  # Weak-spot / "LowFruit" detection (LowFruits + Keyword Chef methodology)
  lowfruit_min_score: 70          # weak_score >= this => flagged lowfruit (easy)
  lowfruit_min_forums: 2          # >=N forum/UGC sites in Top10 => lowfruit
