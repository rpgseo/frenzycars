# FrenzyCars keyword seed set (Phase 1)
# Honest provenance: manually generated by SEO expertise, US-EN automotive.
# NO fabricated metrics. volume/cpc/kd are populated by scripts/seo/keyword_pipeline.py
# against live DataForSEO/Google Ads/SERP APIs.
#
# Fields:
#   category   -> one of the 8 canonical verticals (see /plan)
#   keyword    -> seed (Phase 1)
#   intent     -> Informational | Commercial | Transactional | Navigational
#   ctype      -> pillar | cluster | evergreen-support (content_type hint)
#   priority   -> qualitative (pre-metric) based on long-tail density + reachability
#                 by beatable competitors. CONFIRMED after Phase 4 enrichment.
#   expand     -> which Phase-2 expansions to run: ideas, related, suggest, autocomplete

seeds:

  - category: Maintenance & DIY / Troubleshooting
