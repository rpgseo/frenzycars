- id: oil-in-spark-plug-well
  cluster_id: CL-010
  category: Maintenance
  question: "Why is there oil in the spark plug well?"
  short_answer: >
    Oil pooling in a spark plug well means the valve cover gasket or the spark
    plug tube seal beneath it has failed, letting engine oil seep down around
    the plug and coil. Over time the oil degrades the ignition coil boot and
    causes misfires, so the seals should be replaced promptly.
  is_emergency: false
  causes:
    - "A hardened or cracked valve cover gasket due to heat and age"
    - "A failed spark plug tube seal pressed into the valve cover"
    - "An over-tightened valve cover distorting the gasket and seal"
    - "A clogged PCV valve raising crankcase pressure and forcing oil past seals"
  steps:
    - title: "Distinguish oil in the well from oil on the threads"
      detail: "Oil sitting around the coil boot in the tube indicates a seal leak. Oil only on the threaded end of the plug points to internal engine oil consumption, a different problem."
    - title: "Inspect the valve cover and PCV"
      detail: "Look for wetness along the valve cover mating edge and check the PCV valve and breather hoses for blockage that raises pressure."
    - title: "Replace the gasket set and seals"
      detail: "Remove the valve cover, clean both mating surfaces, and install a new gasket and tube seal set. Follow the manufacturer's bolt torque sequence."
  when_to_see_mechanic:
    - "The ignition coil is oil-soaked and misfiring"
    - "Multiple wells are oil-filled"
    - "The valve cover is plastic and cracked or the bolts are seized"
