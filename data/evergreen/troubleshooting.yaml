- id: bleed-brakes-without-vacuum-pump
  cluster_id: CL-035
  category: Maintenance
  question: "How do you bleed brakes without a vacuum pump?"
  short_answer: >
    You can bleed brakes without a vacuum pump using the gravity method (simply
    open each bleeder and let fluid drip out) or the manual pump-and-hold method
    with a helper. A cheap one-person check-valve bleeder hose also works without
    any pump and lets you do the job alone.
  is_emergency: false
  causes:
    - "Air is in the lines after a caliper, hose, or master cylinder was replaced"
    - "The brake fluid is due for service and has absorbed moisture"
    - "The pedal feels spongy or sinks after any hydraulic work"
    - "A bleeder valve was left open or loosened and drew in air"
  steps:
    - title: "Top up and prepare the master cylinder"
      detail: "Fill the reservoir with fresh, sealed fluid of the correct DOT rating and leave the cap loosely resting on top to allow airflow."
    - title: "Use gravity or the manual method"
      detail: "For gravity bleeding, open the farthest bleeder and let it drip until bubble-free. For the manual method, have a helper pump the pedal three times and hold, then open the valve to release fluid and air, closing before the pedal reaches the floor."
    - title: "Repeat around the car and refill"
      detail: "Work from the longest line to the shortest (rear passenger last). Refill the reservoir after each wheel so it never runs dry."
  when_to_see_mechanic:
    - "The pedal stays soft after a careful manual bleed"
    - "You suspect air trapped in the ABS module"
    - "A bleeder valve is rounded off or seized shut"
  diy_difficulty: intermediate
  typical_cost:
    low: 15
    high: 40
    currency: USD
    note: "Brake fluid plus an inexpensive one-person check-valve bleeder hose."
