- id: how-to-fix-ac-blowing-hot-air
  cluster_id: CL-016
  category: Maintenance
  question: "How do you fix a car AC blowing hot air?"
  short_answer: >
    A car AC blowing warm air most often has low refrigerant from a small leak,
    though a faulty compressor, a clogged expansion valve, or an electrical
    issue with the cooling fan can also be the cause. Start by checking
    refrigerant pressure, then inspect the compressor and cooling fans.
  is_emergency: false
  causes:
    - "Low refrigerant due to a slow leak in a hose, fitting, or the condenser"
    - "A failed AC compressor clutch or internal compressor failure"
    - "A clogged expansion valve or receiver-drier restricting refrigerant flow"
    - "An inoperative radiator or condenser cooling fan causing high-side overheating"
  steps:
    - title: "Check the AC clutch engagement"
      detail: "With the engine running and AC on, watch the compressor pulley. The outer clutch plate should spin with the pulley. If it never engages, suspect low pressure or an electrical fault."
    - title: "Measure refrigerant pressure"
      detail: "Attach a manifold gauge set to the low and high service ports. Compare readings to the ambient-temperature pressure chart to diagnose low charge, blockage, or compressor failure."
    - title: "Inspect the condenser and cooling fans"
      detail: "Look for bent, debris-clogged, or leaking condenser fins. Confirm both radiator fans spin up when the AC is switched on."
  when_to_see_mechanic:
    - "Gauge readings indicate a compressor or expansion-valve failure"
    - "The system is empty and the leak source is not obvious"
    - "You do not have a gauge set or recovery equipment"
  diy_difficulty: advanced
  typical_cost:
