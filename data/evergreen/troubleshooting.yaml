        against theirs. Loop recording and motion-sensor parking mode mean it
        runs unattended once mounted. It is the rare gift that pays for itself
        the very first time it matters.
      price_range: "$50–$150"
      best_for: "The daily commuter and the safety-minded driver"
      url: "https://www.amazon.com/s?k=dash+cam+for+cars"
    - id: magnetic-phone-mount
      keyword: "magnetic car phone mount"
