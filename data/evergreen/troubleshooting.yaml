  red_flags:
  - Quotes under $2,000 for a full sedan wrap — this almost certainly means calendared vinyl, no paint prep, or trimming around hardware instead of disassembling
  - Shop cannot name the vinyl brand or shows you unlabeled rolls — counterfeit and low-grade vinyl is common; insist on 3M, Avery, Orajet, or KPMF
  - No written warranty or warranty under 1 year — reputable installers stand behind their work for 2-5 years
  - Installer refuses to remove door handles, mirrors, or trim — proper wrapping requires disassembly; wrapping around hardware creates visible seams and lifting edges
  - Shop has no portfolio or before/after photos — quality wrappers document their work; no portfolio means inexperience
  - Pressure to pay full amount upfront — standard practice is 50% deposit (materials) with balance due on completion and inspection
  - Shop is unwilling to let you watch or inspect the work in progress — transparency matters; hiding the workspace suggests shortcuts
  faq:
  - q: Is it cheaper to wrap or paint a car?
    a: A basic single-color paint job ($1,000-$3,000) is often cheaper than a quality wrap ($2,500-$5,000), but a quality paint job that matches wrap finish quality costs $5,000-$10,000+. Wrapping is also reversible while painting is permanent.
  - q: How long does a car wrap last?
    a: A quality cast vinyl wrap lasts 5-7 years with proper care. Gloss and satin finishes tend to last longest (6-7 years), while matte and chrome may show wear sooner (4-5 years). UV exposure and harsh washing are the main lifespan reducers.
  - q: Can I wrap my car myself?
    a: DIY wrapping is possible for small areas (roof, hood, mirrors) but a full-vehicle wrap requires professional tools, a climate-controlled space, and significant skill. Mistakes are costly — a ruined roll of vinyl is $200-$400. Budget 40-60 hours for a first-time full wrap.
  - q: Will wrapping damage my car's paint?
    a: Quality cast vinyl applied to factory-cured OEM paint will not damage it when properly removed. However, wrapping over aftermarket paint, touch-ups, or damaged clear coat can cause paint to peel with the vinyl. Always test a small area first.
  - q: How much does a partial car wrap cost?
    a: Partial wraps (roof, hood, racing stripes, or accents) cost $300-$1,500 depending on area and complexity. A roof wrap is typically $400-$800, while hood + roof + trunk is $800-$1,500.
  - q: How long does it take to wrap a car?
    a: 'A professional shop typically needs 2-4 days for a full vehicle wrap: 1 day for prep and disassembly, 1-2 days for installation, and partial day for reassembly and inspection. Complex vehicles or specialty finishes may take 5-7 days.'
  - q: How much does it cost to remove a car wrap?
    a: Professional wrap removal costs $400-$800 for a sedan, depending on wrap age and condition. Older wraps (5+ years) are harder to remove and cost more. DIY removal is possible but risks paint damage if done improperly.
  - q: Can I wrap a leased car?
    a: Yes, wrapping a leased car is common and generally acceptable since quality vinyl is fully removable. However, check your lease terms, inform your insurer, and keep documentation. Remove the wrap before lease return to avoid reconditioning charges.
