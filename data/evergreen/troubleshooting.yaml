  steps:
    - title: "Budget time for preparation"
      detail: "A thorough wash, clay bar, and paint decontamination take at least half a day. Any scratches or imperfections show through the vinyl and must be corrected first."
    - title: "Factor in disassembly and reassembly"
      detail: "Removing door handles, mirrors, trim, and badges so the vinyl can be tucked behind them adds several hours and requires care to avoid breakage."
    - title: "Plan for curing and inspection"
