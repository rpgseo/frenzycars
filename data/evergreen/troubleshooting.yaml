- id: is-gap-insurance-worth-it
  cluster_id: CL-076
  category: Insurance
  question: "Is gap insurance worth it?"
  short_answer: >
    Gap (guaranteed asset protection) insurance is worth it when you owe more on
    your loan or lease than the car is currently worth. If the vehicle is
    totaled or stolen, standard insurance pays only the actual cash value, which
    can leave you paying off a loan for a car you no longer own — gap covers
    that difference.
  is_emergency: false
  causes:
    - "You financed with a small or zero down payment, so you owe more than the car's value"
    - "You have a long loan term (60 to 84 months) and depreciation outpaces payoff"
    - "You leased the vehicle, where gap coverage is often required"
    - "You rolled negative equity from a previous loan into the new one"
  steps:
    - title: "Compare your loan balance to the car's value"
      detail: "Check your current payoff amount against the vehicle's actual cash value using valuation guides. If the loan is higher, you are upside down and gap helps."
    - title: "Check if gap is already included"
      detail: "Review your loan or lease agreement and auto policy. Many leases include gap coverage, and some lenders bundle it, so you may not need to buy more."
    - title: "Shop the price, not just the dealer"
      detail: "Dealers often charge more for gap than your auto insurer or a standalone provider. Get a quote from your existing insurer before buying at the dealership."
  when_to_see_mechanic: []
  diy_difficulty: beginner
  typical_cost:
    low: 20
    high: 700
    currency: USD
    note: "Gap as a low annual auto-policy add-on, up to a one-time dealer charge."
  related_queries:
    - "when should you not get gap insurance"
    - "how much is gap insurance from dealer vs insurance"
    - "does gap insurance cover a totaled car"
  publish_date: 2026-07-07
  sources:
    - "III Insurance Information Institute gap insurance guidance"
    - "State insurance department consumer resources"

- id: how-much-does-it-cost-to-wrap-a-car
  cluster_id: CL-017
  category: Maintenance
  question: "How much does it cost to wrap a car?"
  short_answer: >
    A full professional car wrap typically costs between $2,000 and $5,000,
    depending on vehicle size, the quality of vinyl, and the complexity of the
    design. A partial wrap or color-change on a small sedan sits at the lower
    end, while custom graphics, chrome, or large SUVs push the price higher.
  is_emergency: false
  causes:
    - "Larger vehicles require more material and labor hours"
    - "Premium cast vinyl and specialty finishes (chrome, color-shift) cost far more"
    - "Complex custom designs and printed graphics add design and installation time"
    - "Paint preparation and defect correction are required before wrapping"
  steps:
    - title: "Get quotes based on your specific vehicle"
      detail: "Provide the year, make, model, and desired finish to get accurate quotes. Prices vary significantly between sedans, trucks, and SUVs."
    - title: "Ask what the quote includes"
      detail: "Confirm whether the price covers surface prep, disassembly of handles and trim, and a warranty. A low quote may skip these steps and deliver a poor result."
    - title: "Compare vinyl quality"
      detail: "Cast vinyl (3M, Avery, Orajet) conforms to curves and lasts longer than cheaper calendared film. Ask which material an installer uses and its expected lifespan."
  when_to_see_mechanic:
    - "You want a warranty-backed, paint-safe professional installation"
    - "The vehicle's paint is damaged and needs correction before wrapping"
    - "You need a complex custom design or full-vehicle printed graphic"
