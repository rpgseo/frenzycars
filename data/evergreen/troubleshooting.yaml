- id: single-click-when-trying-to-start-car
  cluster_id: CL-051
  category: Maintenance
  question: "What does a single click mean when trying to start your car?"
  short_answer: >
    A single, loud click when you turn the key (with no engine cranking) usually
    points to the starter motor or its solenoid — the starter gear is not
    engaging the flywheel. It can also mean a poor connection at the battery or
    starter, or a fully discharged battery that has enough power to click but
    not to crank.
  is_emergency: false
  causes:
    - "A failed starter solenoid that clicks but does not extend the starter gear"
    - "Corroded or loose battery terminals limiting current to the starter"
    - "A worn or dead starter motor with worn brushes or a failed Bendix drive"
    - "A deeply discharged battery that cannot deliver cranking amps"
  steps:
    - title: "Check the battery and terminals"
      detail: "Clean any corrosion from the battery posts and tighten the cable clamps. Test battery voltage with a meter — a healthy battery reads above 12.4 V at rest."
    - title: "Tap the starter while a helper turns the key"
      detail: "Lightly tap the starter body with a wrench while someone turns the key. If the engine cranks, the starter has a dead spot and needs replacement."
    - title: "Test voltage at the starter"
      detail: "With a helper turning the key, measure voltage at the starter's main terminal. Battery voltage present but no cranking confirms a starter failure."
  when_to_see_mechanic:
    - "The battery and terminals are good but the starter still only clicks"
    - "The starter is difficult to reach or requires lifting the vehicle"
    - "Multiple electrical systems are dead, suggesting a bigger wiring fault"
  diy_difficulty: intermediate
  typical_cost:
    low: 200
    high: 600
    currency: USD
    note: "Starter motor replacement, parts and labor."
  related_queries:
    - "single click when starting car not battery"
    - "starter clicking but not engaging"
    - "car makes one click and wont start"
