    a: 'The Lexus RX and Lexus GX are the most reliable used luxury SUVs, with many examples exceeding 200,000 miles with routine maintenance. The Acura MDX is another strong used pick thanks to its durable V6 and AWD system. When shopping used, prioritize naturally aspirated engines and proven hybrid systems over early turbocharged or air-suspended models.'
  - q: Do reliable luxury SUVs cost less to maintain?
    a: 'Generally yes—luxury SUVs with better reliability ratings also have lower average repair costs, though parts and labor are still priced at a premium tier. A Lexus or Acura SUV typically costs less to maintain over five years than a comparably priced BMW or Mercedes-Benz, even before factoring in fewer unscheduled repairs.'
  - q: Why do German luxury SUVs rank lower on reliability?
    a: 'German luxury SUVs often rank lower on reliability because they adopt complex technology sooner—air suspensions, 48-volt mild-hybrid systems, and advanced driver-assistance features that increase failure points. They are engineered for driving dynamics and innovation first, whereas Lexus and Acura prioritize proven, conservative engineering that sacrifices some performance edge for long-term durability.'
  typical_cost:
    low: 42000
    high: 95000
    currency: USD
    note: 'Mainstream luxury SUVs span roughly $42,000 for a compact entry like the Lexus NX to over $90,000 for full-size flagships such as the Lexus LX; ultra-premium models like the Mercedes-Benz G-Class push well beyond that range.'
