- id: is-gap-insurance-worth-it
  cluster_id: CL-076
  category: Insurance
  question: "Is gap insurance worth it?"
  short_answer: >
    Gap (guaranteed asset protection) insurance is worth it when you owe more on
    your loan or lease than the car is currently worth. If the vehicle is
    totaled or stolen, standard insurance pays only the actual cash value, which
    can leave you paying off a loan for a car you no longer own — gap covers
    that difference.
  is_emergency: false
  causes:
    - "You financed with a small or zero down payment, so you owe more than the car's value"
    - "You have a long loan term (60 to 84 months) and depreciation outpaces payoff"
    - "You leased the vehicle, where gap coverage is often required"
    - "You rolled negative equity from a previous loan into the new one"
  steps:
    - title: "Compare your loan balance to the car's value"
      detail: "Check your current payoff amount against the vehicle's actual cash value using valuation guides. If the loan is higher, you are upside down and gap helps."
    - title: "Check if gap is already included"
      detail: "Review your loan or lease agreement and auto policy. Many leases include gap coverage, and some lenders bundle it, so you may not need to buy more."
    - title: "Shop the price, not just the dealer"
      detail: "Dealers often charge more for gap than your auto insurer or a standalone provider. Get a quote from your existing insurer before buying at the dealership."
  when_to_see_mechanic: []
  diy_difficulty: beginner
  typical_cost:
    low: 20
    high: 700
    currency: USD
    note: "Gap as a low annual auto-policy add-on, up to a one-time dealer charge."
  related_queries:
