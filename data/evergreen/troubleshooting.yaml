    SUVs you can buy, and either can exceed 200,000 miles with regular
    maintenance. The RAV4 generally holds a slight edge in long-term
    reliability and lower average repair costs thanks to proven, simpler
    powertrains and Toyota's strong hybrid reputation, while the CR-V is
    praised for ride comfort, handling, and interior space. Specific
    generations matter: the CR-V's 1.5L turbo has had cold-climate oil-dilution
    reports, and certain RAV4 years were part of a fuel-pump recall, so always
    verify recalls and service history on any used unit.
