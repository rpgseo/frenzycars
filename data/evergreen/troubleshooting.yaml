- id: how-to-bleed-brakes-by-yourself
  cluster_id: CL-009
  category: Maintenance
  question: "How do you bleed brakes by yourself?"
  short_answer: >
    Bleeding brakes removes air trapped in the brake lines so the pedal stays
    firm. The simplest solo method is gravity bleeding — open the bleeder
    valve on each caliper, let fluid drip out until bubble-free, and keep the
    master cylinder topped up. A one-person bleeder valve (check valve) kit
    makes the job faster and cleaner.
  is_emergency: false
  causes:
    - "Air entered the lines when a caliper, hose, or master cylinder was opened"
    - "The brake fluid is old and has absorbed moisture, lowering its boiling point"
    - "The pedal feels spongy or sinks after a hydraulic repair"
    - "The system was run low on fluid, drawing air into the master cylinder"
  steps:
    - title: "Top up the master cylinder"
      detail: "Fill the reservoir with fresh, sealed brake fluid of the correct DOT rating (e.g. DOT 3 or DOT 4). Never let it run dry during the process."
    - title: "Open the bleeder valve farthest from the master cylinder"
      detail: "Start at the rear passenger wheel (the longest line). Attach a hose to the bleeder nipple and submerge the other end in a jar of clean fluid."
    - title: "Let fluid flow until bubble-free"
      detail: "With gravity bleeding, open the valve and wait for a steady drip with no air bubbles. With a check-valve kit, pump the pedal gently several times, watching for bubbles."
    - title: "Close and repeat for each wheel"
      detail: "Close the bleeder before the pedal reaches the floor. Move to the next-farthest wheel and repeat, topping up the master cylinder after each corner."
  when_to_see_mechanic:
    - "The pedal stays spongy after bleeding all four wheels"
    - "The master cylinder ran completely dry during the job"
    - "A bleeder valve snaps off and is seized in the caliper"
  diy_difficulty: intermediate
  typical_cost:
    low: 20
    high: 50
    currency: USD
    note: "One to two bottles of brake fluid plus a cheap one-person bleeder kit."
  related_queries:
    - "can you bleed brakes without a partner"
    - "gravity bleeding brakes how long"
    - "brake pedal still spongy after bleeding"
  publish_date: 2026-06-26
  sources:
    - "DOT brake fluid performance standards (FMVSS 116)"
    - "ASE brake system service reference"

- id: why-is-my-car-shaking-at-idle
  cluster_id: CL-019
  category: Maintenance
  question: "Why is my car shaking at idle?"
  short_answer: >
    A car that shakes while idling, but smooths out when you accelerate, usually
    has a problem in the engine's air, fuel, or ignition system — most commonly
    worn spark plugs, a dirty fuel injector, or a failing ignition coil causing
    a slight misfire at low rpm.
  is_emergency: false
  causes:
    - "Worn or fouled spark plugs causing a rough idle misfire"
    - "A dirty or clogged fuel injector delivering uneven fuel spray"
    - "Worn engine mounts letting normal vibration transfer to the body"
    - "A dirty throttle body or faulty idle air control valve disrupting airflow"
  steps:
    - title: "Note when the shaking happens"
      detail: "If it appears only at idle but clears above 1000 rpm, focus on ignition and fuel. If it worsens in gear, suspect engine or transmission mounts."
    - title: "Scan for misfire codes"
      detail: "Use an OBD2 scanner. Even without a check engine light, pending codes like P0300 point to a specific cylinder or random misfire."
    - title: "Inspect spark plugs and coils"
      detail: "Check plug gap and condition, and look for cracks in coil boots. Swap coils between cylinders to see if the misfire moves."
  when_to_see_mechanic:
    - "The shaking is accompanied by a check engine light"
    - "You notice a loss of power or stalling"
    - "The vibration is clearly from the drivetrain, not the engine"
